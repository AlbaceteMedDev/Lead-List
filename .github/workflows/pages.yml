name: Deploy Dashboard to GitHub Pages

on:
  push:
    branches: [main, claude/extract-sessions-build-dashboards-TVO0d]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore NPPES cache
        uses: actions/cache@v4
        with:
          path: data/cache/nppes_cache.json
          key: nppes-cache-${{ runner.os }}
          restore-keys: nppes-cache-

      - name: Run pipeline
        run: python run.py --nppes-cache-only --output lead_list_enriched --dashboard dashboard

      - name: Assemble site
        run: |
          mkdir -p _site
          cp "$(ls -t data/output/dashboard_*.html | head -1)" _site/dashboard.html
          cp "$(ls -t data/output/mobile_*.html | head -1)" _site/mobile.html
          cp "$(ls -t data/output/lead_list_enriched_*.xlsx | head -1)" _site/lead_list.xlsx
          # Custom domain: serves at leads.albacetemeddev.com once DNS + repo Pages setting match
          cp CNAME _site/CNAME
          cat > _site/index.html <<'HTML'
          <!doctype html>
          <html><head><meta charset="utf-8"><title>Albacete MedDev - Lead List</title>
          <meta name="viewport" content="width=device-width, initial-scale=1" />
          <style>
            body { font-family: -apple-system, Segoe UI, Arial, sans-serif; max-width: 720px; margin: 40px auto; padding: 0 20px; color: #1c2833; }
            h1 { color: #1b4f72; }
            a { color: #1b4f72; }
            .btn { display: inline-block; background: #1b4f72; color: #fff; padding: 12px 20px; border-radius: 6px; text-decoration: none; margin: 8px 8px 8px 0; font-weight: 600; }
            .btn.green { background: #27ae60; }
            .muted { color: #566573; font-size: 14px; }
          </style>
          <script>
            // On phones, auto-redirect to the mobile dashboard.
            // ?nomobile=1 keeps you on the desktop landing.
            if (window.matchMedia('(max-width: 820px)').matches && !location.search.includes('nomobile')) {
              location.replace('mobile.html');
            }
          </script>
          </head>
          <body>
            <h1>Albacete MedDev - Lead List</h1>
            <p>Auto-generated by the processing pipeline. Updates on every push.</p>
            <p><a class="btn" href="dashboard.html">Open desktop dashboard</a>
               <a class="btn" href="mobile.html">Open mobile view</a>
               <a class="btn green" href="lead_list.xlsx" download>Download Excel</a></p>
            <p class="muted">Source: <a href="https://github.com/AlbaceteMedDev/Lead-List">AlbaceteMedDev/Lead-List</a></p>
          </body></html>
          HTML

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
